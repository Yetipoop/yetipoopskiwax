<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Yeti Poop Ski Wax</title>
  <meta name="description" content="Yeti Poop Ski Wax gear. Tees, beanies, stickers.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/images/logo-dark.png">
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="/">
        <img src="/images/logo-dark.png" alt="Yeti Poop Ski Wax">
      </a>
      <ul class="nav-links">
        <li><a href="/shop.html">Shop Gear</a></li>
        <li><a href="/wax.html" class="wax-link">Shop Wax</a></li>
        <li><a href="/#about">About Us</a></li>
      </ul>
    </div>
  </nav>

  <!-- SHOP HEADER -->
  <div class="section" style="padding-bottom: 2rem;">
    <div class="container">
      <h1>Gear</h1>
    </div>
  </div>

  <!-- PRODUCT GRID -->
  <section style="padding-bottom: 5rem;">
    <div class="container">
      <div class="product-grid" id="product-grid">
        <div class="loading">Loading</div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="/images/logo-dark.png" alt="Yeti Poop Ski Wax">
      </div>
      <ul class="footer-links">
        <li><a href="/shop.html">Shop Gear</a></li>
        <li><a href="/wax.html">The Wax</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
    </div>
    <div class="container">
      <p class="footer-copy">&copy; 2026 Yeti Poop Ski Wax. Kirkwood, CA.</p>
    </div>
  </footer>

  <script>
    async function loadProducts() {
      const grid = document.getElementById('product-grid');
      try {
        const res = await fetch('/api/products');
        const data = await res.json();
        const products = data.products || [];
        if (!products.length) {
          grid.innerHTML = '<p class="error-msg text-muted" style="grid-column:1/-1;">Nothing here yet. Check back soon.</p>';
          return;
        }
        grid.innerHTML = products.map(p => {
          const price = p.variants?.[0]?.price
            ? '$' + (p.variants[0].price / 100).toFixed(2)
            : '';
          const img = p.images?.[0]?.src || '/images/logo-dark.png';
          return `
            <a class="product-card" href="/product.html?id=${p.id}">
              <div class="product-card-img">
                <img src="${img}" alt="${p.title}" loading="lazy">
              </div>
              <div class="product-card-body">
                <div class="product-card-name">${p.title}</div>
                <div class="product-card-price">${price}</div>
              </div>
            </a>`;
        }).join('');
      } catch (e) {
        grid.innerHTML = '<p class="error-msg text-muted" style="grid-column:1/-1;">Check back soon.</p>';
      }
    }
    loadProducts();
  </script>
</body>
</html>
