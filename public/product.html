<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Yeti Poop Ski Wax</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/images/logo-dark.png">
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="/">
        <img src="/images/logo-dark.png" alt="Yeti Poop Ski Wax">
      </a>
      <ul class="nav-links">
        <li><a href="/shop.html">Shop Gear</a></li>
        <li><a href="/wax.html" class="wax-link">Shop Wax</a></li>
        <li><a href="/#about">About Us</a></li>
        <li><a href="#" id="cart-icon" onclick="openCart(); return false;">Cart (<span id="cart-count">0</span>)</a></li>
      </ul>
    </div>
  </nav>

  <!-- PRODUCT DETAIL -->
  <div class="container">
    <div id="product-detail" class="loading">Loading</div>
  </div>

  <!-- CART OVERLAY -->
  <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>

  <!-- CART DRAWER -->
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h3>Cart</h3>
      <button class="cart-close" onclick="closeCart()">&times;</button>
    </div>
    <div class="cart-items" id="cart-items">
      <div class="cart-empty">Your cart is empty.</div>
    </div>
    <div class="cart-footer" id="cart-footer" style="display:none;">

      <!-- Discount code input -->
      <div id="discount-section" style="margin-bottom:12px;">
        <div id="discount-input-row" style="display:flex;gap:8px;">
          <input type="text" id="discount-input" placeholder="Discount code"
            style="flex:1;padding:8px 10px;background:rgba(255,252,227,0.08);border:1px solid rgba(255,252,227,0.25);border-radius:4px;color:#fffce3;font-family:inherit;font-size:14px;text-transform:uppercase;"
            onkeydown="if(event.key==='Enter') applyDiscount()">
          <button onclick="applyDiscount()"
            style="padding:8px 14px;background:#F7813E;color:#3c5a74;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-size:14px;">Apply</button>
        </div>
        <div id="discount-msg" style="font-size:13px;margin-top:6px;min-height:18px;"></div>
        <div id="discount-applied-row" style="display:none;justify-content:space-between;align-items:center;margin-top:6px;font-size:13px;color:#F7813E;">
          <span id="discount-applied-label"></span>
          <button onclick="removeDiscount()"
            style="background:none;border:none;color:rgba(255,252,227,0.5);cursor:pointer;font-size:1rem;padding:0 2px;">&times;</button>
        </div>
      </div>

      <!-- Subtotal (shown only when discount active) -->
      <div id="cart-subtotal-row" style="display:none;justify-content:space-between;font-size:14px;margin-bottom:4px;opacity:0.7;">
        <span>Subtotal</span>
        <span id="cart-subtotal-display"></span>
      </div>

      <!-- Discount line (shown only when discount active) -->
      <div id="cart-discount-row" style="display:none;justify-content:space-between;font-size:14px;margin-bottom:4px;color:#F7813E;">
        <span id="cart-discount-label">Discount</span>
        <span id="cart-discount-display"></span>
      </div>

      <div class="cart-total">
        <span>Total</span>
        <span id="cart-total">$0.00</span>
      </div>
      <button class="btn btn-primary" style="width:100%; font-size:1.1rem;" onclick="checkout()">Checkout</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer style="margin-top: 4rem;">
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="/images/logo-dark.png" alt="Yeti Poop Ski Wax">
      </div>
      <ul class="footer-links">
        <li><a href="/shop.html">Shop Gear</a></li>
        <li><a href="/wax.html">The Wax</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
    </div>
    <div class="container">
      <p class="footer-copy">&copy; 2026 Yeti Poop Ski Wax. Kirkwood, CA.</p>
    </div>
  </footer>

  <script src="/js/cart.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    let currentProduct = null;
    let selectedOptions = {};

    async function loadProduct() {
      const container = document.getElementById('product-detail');
      if (!productId) {
        container.innerHTML = '<p class="error-msg text-muted">Product not found. <a href="/shop.html">Back to shop</a></p>';
        return;
      }
      try {
        const res = await fetch(`/api/products/${productId}`);
        const product = await res.json();
        currentProduct = product;
        document.title = `${product.title} — Yeti Poop Ski Wax`;
        renderProduct(product);
      } catch (e) {
        container.innerHTML = '<p class="error-msg text-muted">Product not found. <a href="/shop.html">Back to shop</a></p>';
      }
    }

    function renderProduct(p) {
      const mainImg = p.images?.[0]?.src || '/images/logo-dark.png';
      const price = p.variants?.[0]?.price
        ? '$' + (p.variants[0].price / 100).toFixed(2)
        : '';

      // Build options
      const options = p.options || [];
      const optionHtml = options.map((opt, oi) => `
        <div class="mb-2">
          <div class="option-label">${opt.name}</div>
          <div class="option-buttons">
            ${opt.values.map(val => `
              <button class="option-btn" data-option="${oi}" data-value="${val.title}"
                onclick="selectOption(${oi}, '${val.title}', this)">${val.title}</button>
            `).join('')}
          </div>
        </div>
      `).join('');

      // Size chart (collapsible)
      const sc = p.sizeChart;
      const sizeChartHtml = sc ? (() => {
        const tableHtml = (sc.headers && sc.rows) ? `
          <table class="size-chart-table">
            <thead><tr>${sc.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
            <tbody>${sc.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
          </table>` : '';
        const noteHtml = sc.note ? `<p class="size-chart-note">${sc.note}</p>` : '';
        return `<details class="size-chart">
          <summary class="size-chart-toggle">Size chart</summary>
          <div class="size-chart-body">${tableHtml}${noteHtml}</div>
        </details>`;
      })() : '';

      // Thumbnails
      const thumbHtml = (p.images || []).slice(0, 5).map((img, i) => `
        <img src="${img.src}" class="product-thumb ${i === 0 ? 'active' : ''}"
          ${img.view ? `data-view="${img.view}"` : ''}
          onclick="changeMainImg(this.src, this)" alt="View ${i+1}" loading="lazy">
      `).join('');

      document.getElementById('product-detail').innerHTML = `
        <div class="product-detail">
          <div class="product-images">
            <div class="product-main-img${p.imageContain ? ' product-main-img--contain' : ''}">
              <img id="main-img" src="${mainImg}" alt="${p.title}">
            </div>
            <div class="product-thumbnails">${thumbHtml}</div>
          </div>
          <div class="product-info">
            <a href="/shop.html" style="font-size:0.8rem; color:var(--text-muted); letter-spacing:0.08em; text-transform:uppercase;">← Shop</a>
            <h1 style="margin-top:1rem;">${p.title}</h1>
            <div class="product-price">${price}</div>
            <div class="product-description">${p.description || ''}</div>
            ${optionHtml}
            ${sizeChartHtml}
            <button class="add-to-cart-btn" id="atc-btn" onclick="addToCart()" disabled>
              Select options
            </button>
          </div>
        </div>`;

      // Auto-select any option that has exactly one value (no real choice to make),
      // then check if all options are satisfied so the button can enable immediately.
      options.forEach((opt, oi) => {
        if (opt.values.length === 1) {
          const btn = document.querySelector(`[data-option="${oi}"]`);
          if (btn) selectOption(oi, opt.values[0].title, btn);
        }
      });

      // If there are no options at all, enable the button right away.
      if (options.length === 0) {
        const atcBtn = document.getElementById('atc-btn');
        atcBtn.disabled = false;
        atcBtn.textContent = 'Add to Cart';
      }
    }

    function changeMainImg(src, el) {
      document.getElementById('main-img').src = src;
      document.querySelectorAll('.product-thumb').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    function selectOption(optionIndex, value, el) {
      selectedOptions[optionIndex] = value;
      // Update button states for this option group
      document.querySelectorAll(`[data-option="${optionIndex}"]`).forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');

      // Swap main image and thumbnails when a color option changes
      const opt = (currentProduct.options || [])[optionIndex];
      if (opt?.type === 'color') {
        const colorVal = opt.values.find(v => v.title === value);
        if (colorVal?.mockup?.front) {
          document.getElementById('main-img').src = colorVal.mockup.front;
          // Update color-keyed thumbnails
          document.querySelectorAll('.product-thumb[data-view="front"]').forEach(t => t.src = colorVal.mockup.front);
          if (colorVal.mockup.back)
            document.querySelectorAll('.product-thumb[data-view="back"]').forEach(t => t.src = colorVal.mockup.back);
        }
      }

      // Enable add to cart if all options selected
      const totalOptions = (currentProduct.options || []).length;
      const atcBtn = document.getElementById('atc-btn');
      if (Object.keys(selectedOptions).length >= totalOptions) {
        atcBtn.disabled = false;
        atcBtn.textContent = 'Add to Cart';
      }
    }

    function addToCart() {
      if (!currentProduct) return;
      // Find matching variant
      const variant = findVariant();
      if (!variant) return;
      const item = {
        productId: currentProduct.id,
        variantId: variant.id,
        title: currentProduct.title,
        variant: Object.values(selectedOptions).join(' / '),
        price: variant.price,
        image: currentProduct.images?.[0]?.src || '/images/logo-dark.png',
        quantity: 1
      };
      addItemToCart(item);
      openCart();
    }

    function findVariant() {
      if (!currentProduct?.variants) return null;
      const options = currentProduct.options || [];
      return currentProduct.variants.find(v => {
        return options.every((opt, i) => {
          const selectedTitle = selectedOptions[i];
          const selectedValueObj = opt.values.find(val => val.title === selectedTitle);
          if (!selectedValueObj) return false;
          return v.options?.includes(selectedValueObj.id);
        });
      }) || currentProduct.variants[0];
    }

    loadProduct();
  </script>
</body>
</html>
